<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password - Medika AI</title>
  <link href="https://fonts.googleapis.com" rel="preconnect"/>
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
</head>
<body class="bg-[#f8f9ff] text-[#0b1c30] font-sans antialiased">
  <div class="flex min-h-screen">
    <div class="m-auto w-full max-w-lg px-6 py-12">
      <div class="mb-6">
        <h1 class="text-3xl font-semibold">Reset Kata Sandi</h1>
        <p class="text-sm text-gray-600 mt-2">Masukkan password baru. Token hanya berlaku sementara (dev/testing).</p>
      </div>

      {% if message %}
        <div class="mb-4 rounded border border-red-200 bg-red-50 p-3 text-red-700 text-sm" role="alert">
          {{ message }}
        </div>
      {% endif %}

      {# Token sengaja tidak ditampilkan untuk keamanan. #}


      <form action="" method="POST" class="space-y-4">
        <div>
          <label class="block text-sm font-medium mb-1" for="password">Password Baru</label>
          <input id="password" name="password" type="password" required
            class="w-full rounded border border-gray-300 px-3 py-2" placeholder="minimal 4 karakter"/>
        </div>
        <div>
          <label class="block text-sm font-medium mb-1" for="confirm_password">Konfirmasi Password</label>
          <input id="confirm_password" name="confirm_password" type="password" required
            class="w-full rounded border border-gray-300 px-3 py-2" placeholder="ketik ulang password"/>
        </div>

        <button type="submit" class="w-full rounded bg-[#003d9b] text-white py-2 font-semibold">
          Simpan Password Baru
        </button>
      </form>

      <div class="mt-4 text-center text-sm">
        Kembali ke halaman <a class="text-[#003d9b] underline" href="{{ url_for('login_page') }}">Masuk</a>
      </div>
    </div>
  </div>
  <!-- Card Animations Script -->
  <script src="{{ url_for('static', filename='js/card_animations.js') }}"></script>
</body>
</html>
